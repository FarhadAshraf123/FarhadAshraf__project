<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Cards</title>
  <link rel="stylesheet" href="flex.css" />
 
</head>
<body>

  <div class="cards-wrapper">

    
    <div class="card">
      <div class="card-poster">
        <img src="lokah.jpeg" alt="Lokah Chapter 1 Chandra Poster" />
      </div>
      <div class="card-body">
        <h2 class="card-title">LOKAH CHAPTER 1 : CHANDRA</h2>
        <p class="card-description">Lokah Chapter 1: Chandra is a 2025 Indian Malayalam-language superhero action film.</p>
      </div>
      <div class="card-footer">
        <div class="footer-item">
          <div class="footer-label">Directed by</div>
          <div class="footer-value">Dominic Arun</div>
        </div>
        <div class="divider"></div>
        <div class="footer-item">
          <div class="footer-label">Production</div>
          <div class="footer-value">Wayfarer Films</div>
        </div>
      </div>
    </div>

    
    <div class="card">
      <div class="card-poster">
        <img src="thudaram-12.jpeg" alt="Thudarum Poster" />
      </div>
      <div class="card-body">
        <h2 class="card-title">THUDARUM</h2>
        <p class="card-description">Thudarum is a 2025 Malayalam crime thriller film.</p>
      </div>
      <div class="card-footer">
        <div class="footer-item">
          <div class="footer-label">Directed by</div>
          <div class="footer-value">Tharun Moorthy</div>
        </div>
        <div class="divider"></div>
        <div class="footer-item">
          <div class="footer-label">Production</div>
          <div class="footer-value">Rejaputhra Visual Productions</div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
