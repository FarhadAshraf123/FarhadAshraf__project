<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>farhadstore - Sign In</title>
<link href="farhadashraf1.css" rel="stylesheet"/> 

</head>
<body>

<nav>
  <div class="logo"><span>farhad</span> store</div>
  <ul class="nav-links">
    <li><a href="farhadstore.html">Home</a></li>
    <li><a href="farhadstore.html" class="active">Products</a></li>
    <li><a href="#">About</a></li>
    <li><a href="farhadshraf2.html">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="card">
    <p class="card-label">Welcome back</p>
    <h1 class="card-title">Sign In</h1>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <div class="row">
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn-signin"><a href="farhadstore.html">Sign In</a></button>

    <div class="divider">or</div>

    <button class="btn-guest"><a href="farhadstore.html">Continue as Guest</a></button>

    <p class="register">Don't have an account? <a href="#">Create one</a></p>
  </div>
</main>

</body>
</html>
